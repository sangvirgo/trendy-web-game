<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>⚔️ Merge & Survive</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-primary: #0a0a1a;
  --bg-secondary: #12122a;
  --bg-card: rgba(255, 255, 255, 0.05);
  --glass: rgba(255, 255, 255, 0.08);
  --glass-border: rgba(255, 255, 255, 0.12);
  --text-primary: #e0e0ff;
  --text-secondary: #8888bb;
  --accent: #7c3aed;
  --accent-glow: rgba(124, 58, 237, 0.4);
  --gold: #fbbf24;
  --gem: #34d399;
  --danger: #ef4444;
  --health: #22c55e;
  --combo: #f97316;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(ellipse at 20% 50%, rgba(124, 58, 237, 0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(59, 130, 246, 0.1) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(236, 72, 153, 0.08) 0%, transparent 50%);
  animation: bgShift 20s ease-in-out infinite alternate;
  z-index: 0;
  pointer-events: none;
}

@keyframes bgShift {
  0% { opacity: 1; }
  50% { opacity: 0.7; }
  100% { opacity: 1; }
}

#app {
  position: relative;
  z-index: 1;
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  max-width: 480px;
  margin: 0 auto;
  padding: 8px;
  gap: 8px;
}

/* ===== TOP BAR ===== */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 12px;
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  flex-shrink: 0;
}

.resource-display {
  display: flex;
  gap: 16px;
}

.resource {
  display: flex;
  align-items: center;
  gap: 4px;
  font-weight: 700;
  font-size: 14px;
}

.resource .icon { font-size: 16px; }
.resource.gold { color: var(--gold); }
.resource.gem { color: var(--gem); }
.resource.dps { color: var(--combo); }

.wave-info {
  font-size: 12px;
  color: var(--text-secondary);
  text-align: right;
}

.wave-info .wave-num {
  font-size: 16px;
  font-weight: 800;
  color: var(--text-primary);
}

/* ===== ENEMY AREA ===== */
.enemy-area {
  position: relative;
  height: 120px;
  background: var(--glass);
  backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  flex-shrink: 0;
}

.enemy-area::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, transparent 60%, rgba(239, 68, 68, 0.05) 100%);
  pointer-events: none;
}

.enemy-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  position: relative;
  z-index: 1;
}

.enemy-sprite {
  font-size: 48px;
  animation: enemyIdle 2s ease-in-out infinite;
  cursor: pointer;
  transition: transform 0.1s;
  filter: drop-shadow(0 0 10px rgba(239, 68, 68, 0.3));
}

.enemy-sprite:active {
  transform: scale(0.9);
}

@keyframes enemyIdle {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}

.enemy-hp-bar {
  width: 160px;
  height: 12px;
  background: rgba(0,0,0,0.5);
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.1);
}

.enemy-hp-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--danger), #f97316);
  border-radius: 6px;
  transition: width 0.3s ease;
}

.enemy-name {
  font-size: 12px;
  color: var(--text-secondary);
}

.enemy-hp-text {
  font-size: 11px;
  color: var(--danger);
  font-weight: 600;
}

/* ===== MERGE GRID ===== */
.grid-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-height: 0;
}

.grid-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 4px;
}

.grid-header h3 {
  font-size: 13px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.grid-actions {
  display: flex;
  gap: 6px;
}

.grid-actions button {
  padding: 4px 10px;
  font-size: 11px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  color: var(--text-primary);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
}

.grid-actions button:hover {
  background: rgba(255,255,255,0.12);
}

.merge-grid {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  grid-template-rows: repeat(4, 1fr);
  gap: 6px;
  min-height: 0;
}

.grid-cell {
  background: var(--glass);
  backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  cursor: pointer;
  transition: all 0.2s;
  min-height: 60px;
  overflow: hidden;
}

.grid-cell:hover {
  border-color: rgba(124, 58, 237, 0.3);
  background: rgba(255, 255, 255, 0.08);
}

.grid-cell.selected {
  border-color: var(--accent);
  box-shadow: 0 0 15px var(--accent-glow), inset 0 0 15px var(--accent-glow);
}

.grid-cell.merge-target {
  border-color: var(--gem);
  box-shadow: 0 0 15px rgba(52, 211, 153, 0.4);
  animation: pulse 0.8s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 15px rgba(52, 211, 153, 0.4); }
  50% { box-shadow: 0 0 25px rgba(52, 211, 153, 0.6); }
}

.item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  animation: itemAppear 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes itemAppear {
  0% { transform: scale(0); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

.item-icon {
  font-size: 28px;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
}

.item-level {
  font-size: 9px;
  font-weight: 800;
  padding: 1px 6px;
  border-radius: 4px;
  background: rgba(0,0,0,0.4);
  color: var(--text-secondary);
}

/* ===== BOTTOM AREA ===== */
.bottom-area {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}

.gather-btn {
  flex: 1;
  height: 64px;
  border: none;
  border-radius: 16px;
  font-size: 18px;
  font-weight: 800;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  background: linear-gradient(135deg, #7c3aed, #a855f7, #7c3aed);
  background-size: 200% 200%;
  color: white;
  text-shadow: 0 2px 4px rgba(0,0,0,0.3);
  box-shadow: 0 4px 20px var(--accent-glow);
  transition: transform 0.1s, box-shadow 0.2s;
  animation: gradientShift 3s ease-in-out infinite;
}

@keyframes gradientShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.gather-btn:active {
  transform: scale(0.95);
  box-shadow: 0 2px 10px var(--accent-glow);
}

.gather-btn .combo-text {
  position: absolute;
  top: 4px;
  right: 8px;
  font-size: 11px;
  opacity: 0.9;
}

.shop-btn {
  width: 64px;
  height: 64px;
  border: none;
  border-radius: 16px;
  font-size: 28px;
  cursor: pointer;
  background: var(--glass);
  backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.shop-btn:hover {
  background: rgba(255,255,255,0.12);
  transform: scale(1.05);
}

/* ===== TABS ===== */
.tab-bar {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}

.tab-btn {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  background: var(--glass);
  color: var(--text-secondary);
  border: 1px solid transparent;
  transition: all 0.2s;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.tab-btn.active {
  background: rgba(124, 58, 237, 0.2);
  color: var(--text-primary);
  border-color: rgba(124, 58, 237, 0.3);
}

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn 0.2s ease;
}

.modal-overlay.active { display: flex; }

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal {
  background: var(--bg-secondary);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 20px;
  width: 100%;
  max-width: 400px;
  max-height: 80vh;
  overflow-y: auto;
  animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes slideUp {
  from { transform: translateY(30px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.modal-header h2 {
  font-size: 20px;
  background: linear-gradient(135deg, var(--accent), #a855f7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.close-btn {
  width: 32px; height: 32px;
  border: none;
  border-radius: 50%;
  background: var(--glass);
  color: var(--text-primary);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.close-btn:hover { background: rgba(255,255,255,0.15); }

/* ===== SHOP ITEMS ===== */
.shop-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.2s;
}

.shop-item:hover {
  background: rgba(255,255,255,0.08);
  border-color: rgba(124, 58, 237, 0.3);
}

.shop-item.cant-afford {
  opacity: 0.5;
  cursor: not-allowed;
}

.shop-item-icon { font-size: 32px; }
.shop-item-info { flex: 1; }
.shop-item-name { font-weight: 700; font-size: 14px; }
.shop-item-desc { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
.shop-item-cost {
  font-weight: 700;
  font-size: 14px;
  color: var(--gold);
  white-space: nowrap;
}

/* ===== LEADERBOARD ===== */
.lb-entry {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  margin-bottom: 6px;
}

.lb-rank {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 13px;
  background: rgba(124, 58, 237, 0.2);
}

.lb-rank.gold { background: rgba(251, 191, 36, 0.2); color: var(--gold); }
.lb-rank.silver { background: rgba(156, 163, 175, 0.2); color: #9ca3af; }
.lb-rank.bronze { background: rgba(217, 119, 6, 0.2); color: #d97706; }

.lb-name { flex: 1; font-weight: 600; }
.lb-score { color: var(--gold); font-weight: 700; }

/* ===== STATS ===== */
.stat-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--glass-border);
  font-size: 13px;
}

.stat-label { color: var(--text-secondary); }
.stat-value { font-weight: 700; }

/* ===== PRESTIGE ===== */
.prestige-btn {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 16px;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
  background: linear-gradient(135deg, #f97316, #ef4444);
  color: white;
  margin-top: 12px;
  transition: all 0.2s;
  box-shadow: 0 4px 20px rgba(249, 115, 22, 0.3);
}

.prestige-btn:hover { transform: scale(1.02); }
.prestige-btn:active { transform: scale(0.98); }
.prestige-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* ===== POWER-UP INDICATOR ===== */
.powerup-bar {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
  min-height: 32px;
  flex-wrap: wrap;
}

.powerup-tag {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 8px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 8px;
  font-size: 11px;
  font-weight: 600;
  animation: fadeIn 0.3s ease;
}

.powerup-tag .timer {
  color: var(--text-secondary);
  font-size: 10px;
}

/* ===== FLOATING DAMAGE ===== */
.float-dmg {
  position: fixed;
  pointer-events: none;
  font-weight: 800;
  font-size: 18px;
  color: var(--gold);
  text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  animation: floatUp 1s ease-out forwards;
  z-index: 50;
}

.float-dmg.crit {
  font-size: 24px;
  color: #f97316;
}

@keyframes floatUp {
  0% { transform: translateY(0) scale(1); opacity: 1; }
  100% { transform: translateY(-60px) scale(0.5); opacity: 0; }
}

/* ===== PARTICLES ===== */
.particle {
  position: fixed;
  pointer-events: none;
  width: 6px; height: 6px;
  border-radius: 50%;
  animation: particleFly 0.8s ease-out forwards;
  z-index: 50;
}

@keyframes particleFly {
  0% { transform: translate(0, 0) scale(1); opacity: 1; }
  100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
}

/* ===== WAVE BANNER ===== */
.wave-banner {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 32px;
  font-weight: 900;
  color: white;
  text-shadow: 0 4px 20px rgba(0,0,0,0.5);
  z-index: 60;
  animation: bannerIn 2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  pointer-events: none;
  text-align: center;
}

@keyframes bannerIn {
  0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
  30% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
  70% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
}

/* ===== DEATH SCREEN ===== */
.death-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 20px;
  padding: 20px;
}

.death-overlay.active { display: flex; }

.death-title {
  font-size: 36px;
  font-weight: 900;
  color: var(--danger);
  text-shadow: 0 4px 20px rgba(239, 68, 68, 0.5);
}

.death-stats {
  text-align: center;
  color: var(--text-secondary);
  font-size: 14px;
  line-height: 2;
}

.restart-btn {
  padding: 16px 40px;
  border: none;
  border-radius: 16px;
  font-size: 18px;
  font-weight: 800;
  cursor: pointer;
  background: linear-gradient(135deg, #7c3aed, #a855f7);
  color: white;
  transition: all 0.2s;
}

.restart-btn:hover { transform: scale(1.05); }

/* ===== SETTINGS ===== */
.setting-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--glass-border);
}

.toggle {
  width: 44px; height: 24px;
  border-radius: 12px;
  background: rgba(255,255,255,0.1);
  border: none;
  cursor: pointer;
  position: relative;
  transition: background 0.3s;
}

.toggle.on { background: var(--accent); }

.toggle::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: white;
  transition: transform 0.3s;
}

.toggle.on::after { transform: translateX(20px); }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

/* ===== RESPONSIVE ===== */
@media (max-height: 600px) {
  .enemy-area { height: 90px; }
  .enemy-sprite { font-size: 36px; }
  .grid-cell { min-height: 48px; }
  .item-icon { font-size: 22px; }
  .gather-btn { height: 52px; font-size: 16px; }
  .shop-btn { width: 52px; height: 52px; font-size: 24px; }
}

@media (min-width: 768px) {
  #app {
    max-width: 420px;
    padding: 16px;
    gap: 12px;
  }
}
</style>
</head>
<body>

<div id="app">
  <div class="top-bar">
    <div class="resource-display">
      <div class="resource gold"><span class="icon">🪙</span><span id="gold-display">0</span></div>
      <div class="resource gem"><span class="icon">💎</span><span id="gem-display">0</span></div>
      <div class="resource dps"><span class="icon">⚔️</span><span id="dps-display">0</span>/s</div>
    </div>
    <div class="wave-info">
      <div>Wave <span class="wave-num" id="wave-display">1</span></div>
      <div id="enemies-left">0 enemies left</div>
    </div>
  </div>

  <div class="powerup-bar" id="powerup-bar"></div>

  <div class="enemy-area" id="enemy-area">
    <div class="enemy-container">
      <div class="enemy-sprite" id="enemy-sprite" onclick="Game.clickEnemy(event)">👹</div>
      <div class="enemy-hp-bar"><div class="enemy-hp-fill" id="enemy-hp-fill" style="width:100%"></div></div>
      <div class="enemy-hp-text" id="enemy-hp-text">100 / 100</div>
      <div class="enemy-name" id="enemy-name">Goblin</div>
    </div>
  </div>

  <div class="grid-container">
    <div class="grid-header">
      <h3>🎒 Merge Grid</h3>
      <div class="grid-actions">
        <button onclick="Game.buyNewItem('gold')">+ Buy (🪙50)</button>
        <button onclick="Game.autoMerge()">🔄 Merge All</button>
      </div>
    </div>
    <div class="merge-grid" id="merge-grid"></div>
  </div>

  <div class="bottom-area">
    <button class="gather-btn" id="gather-btn" onclick="Game.gather(event)">
      ⛏️ Gather
      <span class="combo-text" id="combo-display"></span>
    </button>
    <button class="shop-btn" onclick="UI.openModal('shop')">🏪</button>
    <button class="shop-btn" onclick="UI.openModal('more')">☰</button>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="UI.closeModal(event)">
  <div class="modal" id="modal-content"></div>
</div>

<div class="death-overlay" id="death-screen">
  <div class="death-title">💀 GAME OVER</div>
  <div class="death-stats" id="death-stats"></div>
  <button class="restart-btn" onclick="Game.restart()">🔄 Try Again</button>
</div>

<script>
// ===== AUDIO ENGINE =====
const SFX = (() => {
  let ctx = null;
  let enabled = true;

  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    return ctx;
  }

  function play(type) {
    if (!enabled) return;
    try {
      const c = getCtx();
      const osc = c.createOscillator();
      const gain = c.createGain();
      osc.connect(gain);
      gain.connect(c.destination);

      switch(type) {
        case 'click':
          osc.frequency.setValueAtTime(800, c.currentTime);
          osc.frequency.exponentialRampToValueAtTime(400, c.currentTime + 0.1);
          gain.gain.setValueAtTime(0.15, c.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, c.currentTime + 0.1);
          osc.start(c.currentTime);
          osc.stop(c.currentTime + 0.1);
          break;
        case 'merge':
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(400, c.currentTime);
          osc.frequency.exponentialRampToValueAtTime(1200, c.currentTime + 0.2);
          gain.gain.setValueAtTime(0.2, c.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, c.currentTime + 0.3);
          osc.start(c.currentTime);
          osc.stop(c.currentTime + 0.3);
          break;
        case 'hit':
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(200, c.currentTime);
          osc.frequency.exponentialRampToValueAtTime(50, c.currentTime + 0.15);
          gain.gain.setValueAtTime(0.12, c.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, c.currentTime + 0.15);
          osc.start(c.currentTime);
          osc.stop(c.currentTime + 0.15);
          break;
        case 'kill':
          osc.type = 'square';
          osc.frequency.setValueAtTime(600, c.currentTime);
          osc.frequency.exponentialRampToValueAtTime(100, c.currentTime + 0.3);
          gain.gain.setValueAtTime(0.15, c.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, c.currentTime + 0.4);
          osc.start(c.currentTime);
          osc.stop(c.currentTime + 0.4);
          break;
        case 'buy':
          osc.type = 'sine';
          osc.frequency.setValueAtTime(500, c.currentTime);
          osc.frequency.setValueAtTime(700, c.currentTime + 0.1);
          osc.frequency.setValueAtTime(900, c.currentTime + 0.2);
          gain.gain.setValueAtTime(0.12, c.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, c.currentTime + 0.3);
          osc.start(c.currentTime);
          osc.stop(c.currentTime + 0.3);
          break;
        case 'error':
          osc.type = 'square';
          osc.frequency.setValueAtTime(200, c.currentTime);
          osc.frequency.setValueAtTime(150, c.currentTime + 0.1);
          gain.gain.setValueAtTime(0.1, c.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, c.currentTime + 0.2);
          osc.start(c.currentTime);
          osc.stop(c.currentTime + 0.2);
          break;
        case 'powerup':
          osc.type = 'sine';
          osc.frequency.setValueAtTime(400, c.currentTime);
          osc.frequency.exponentialRampToValueAtTime(1600, c.currentTime + 0.3);
          gain.gain.setValueAtTime(0.15, c.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, c.currentTime + 0.4);
          osc.start(c.currentTime);
          osc.stop(c.currentTime + 0.4);
          break;
        case 'prestige':
          osc.type = 'sine';
          [400, 500, 600, 800, 1000, 1200].forEach((f, i) => {
            osc.frequency.setValueAtTime(f, c.currentTime + i * 0.08);
          });
          gain.gain.setValueAtTime(0.15, c.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, c.currentTime + 0.6);
          osc.start(c.currentTime);
          osc.stop(c.currentTime + 0.6);
          break;
      }
    } catch(e) {}
  }

  return { play, toggle: () => { enabled = !enabled; return enabled; }, get enabled() { return enabled; } };
})();

// ===== SAVE/LOAD =====
const Save = {
  key: 'mergeSurvive_save',
  save() {
    const s = { ...GameState };
    delete s.enemy; delete s.selectedCell; delete s.comboTimer;
    localStorage.setItem(this.key, JSON.stringify(s));
  },
  load() {
    try {
      const d = JSON.parse(localStorage.getItem(this.key));
      if (d) {
        Object.assign(GameState, d);
        GameState.grid = d.grid || [];
        GameState.activePowerups = d.activePowerups || {};
        GameState.selectedCell = -1;
        GameState.combo = 0;
        GameState.comboTimer = 0;
        GameState.comboMultiplier = 1;
        GameState.lastTick = Date.now();
      }
    } catch(e) {}
  },
  clear() {
    localStorage.removeItem(this.key);
  }
};

// ===== LEADERBOARD =====
const Leaderboard = {
  key: 'mergeSurvive_leaderboard',
  get() {
    try { return JSON.parse(localStorage.getItem(this.key)) || []; } catch(e) { return []; }
  },
  add(name, score) {
    const lb = this.get();
    lb.push({ name, score, date: Date.now() });
    lb.sort((a, b) => b.score - a.score);
    if (lb.length > 20) lb.length = 20;
    localStorage.setItem(this.key, JSON.stringify(lb));
  }
};

// ===== PARTICLES & EFFECTS =====
const FX = {
  particles(x, y, color = '#7c3aed', count = 8) {
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = x + 'px';
      p.style.top = y + 'px';
      p.style.background = color;
      const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
      const dist = 30 + Math.random() * 40;
      p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
      p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 800);
    }
  },
  floatDamage(x, y, text, isCrit = false) {
    const d = document.createElement('div');
    d.className = 'float-dmg' + (isCrit ? ' crit' : '');
    d.textContent = text;
    d.style.left = (x - 20) + 'px';
    d.style.top = (y - 20) + 'px';
    document.body.appendChild(d);
    setTimeout(() => d.remove(), 1000);
  },
  waveBanner(text) {
    const b = document.createElement('div');
    b.className = 'wave-banner';
    b.textContent = text;
    document.body.appendChild(b);
    setTimeout(() => b.remove(), 2000);
  },
  screenShake() {
    const app = document.getElementById('app');
    app.style.transform = 'translateX(3px)';
    setTimeout(() => app.style.transform = 'translateX(-3px)', 50);
    setTimeout(() => app.style.transform = 'translateX(2px)', 100);
    setTimeout(() => app.style.transform = '', 150);
  }
};

// ===== GAME ENGINE =====
const Game = {
  init() {
    Save.load();
    this.ensureGrid();
    this.spawnEnemy();
    this.recalcDps();
    UI.renderGrid();
    UI.updateAll();

    setInterval(() => this.tick(), 100);
    setInterval(() => this.save(), 5000);
    setInterval(() => this.powerupTick(), 1000);

    setInterval(() => {
      if (GameState.activePowerups.autoMerge) {
        this.autoMerge();
      }
    }, 1000);

    setInterval(() => {
      if (GameState.autoClickers > 0 && GameState.enemy) {
        for (let i = 0; i < GameState.autoClickers; i++) {
          this.dealDamage(GameState.clickDps * GameState.dpsMultiplier * GameState.prestigeMultiplier);
        }
      }
    }, 1000);
  },

  ensureGrid() {
    while (GameState.grid.length < GameState.gridSize) {
      GameState.grid.push(null);
    }
  },

  tick() {
    const now = Date.now();
    const dt = (now - GameState.lastTick) / 1000;
    GameState.lastTick = now;

    if (GameState.enemy && GameState.dps > 0) {
      const dmg = GameState.dps * GameState.dpsMultiplier * GameState.prestigeMultiplier * dt;
      if (GameState.activePowerups.doubleDps) {
        this.dealDamage(dmg * 2);
      } else {
        this.dealDamage(dmg);
      }
    }

    if (GameState.comboTimer > 0) {
      GameState.comboTimer -= dt;
      if (GameState.comboTimer <= 0) {
        GameState.combo = 0;
        GameState.comboMultiplier = 1;
      }
    }

    UI.updateResources();
    UI.updateEnemy();
  },

  powerupTick() {
    const now = Date.now();
    for (const [key, data] of Object.entries(GameState.activePowerups)) {
      if (now >= data.endTime) {
        delete GameState.activePowerups[key];
      }
    }
    UI.updatePowerups();
  },

  gather(event) {
    SFX.play('click');
    const baseGain = (1 + GameState.dpsUpgradeLevel) * GameState.prestigeMultiplier;
    let gain = baseGain;

    GameState.combo++;
    GameState.comboTimer = 2;
    if (GameState.combo >= 5) GameState.comboMultiplier = 1.5;
    if (GameState.combo >= 15) GameState.comboMultiplier = 2;
    if (GameState.combo >= 30) GameState.comboMultiplier = 3;
    if (GameState.combo >= 50) GameState.comboMultiplier = 5;

    gain *= GameState.comboMultiplier;

    if (GameState.activePowerups.doubleGold) gain *= 2;

    gain = Math.floor(gain);
    GameState.gold += gain;
    GameState.totalGold += gain;
    GameState.totalLifetimeGold += gain;

    let clickDmg = GameState.clickDps * GameState.dpsMultiplier * GameState.prestigeMultiplier;
    clickDmg *= GameState.comboMultiplier;
    if (GameState.activePowerups.doubleDps) clickDmg *= 2;

    let critChance = GameState.critChance + (GameState.activePowerups.critBoost ? 0.5 : 0);
    let isCrit = Math.random() < critChance;
    if (isCrit) clickDmg *= GameState.critMultiplier;

    this.dealDamage(clickDmg);

    const rect = event.target.getBoundingClientRect();
    const x = event.clientX || (rect.left + rect.width / 2);
    const y = event.clientY || (rect.top + rect.height / 2);
    FX.floatDamage(x, y, '+' + formatNum(gain), isCrit);
    FX.particles(x, y, isCrit ? '#f97316' : '#fbbf24', isCrit ? 12 : 6);

    UI.updateCombo();
    UI.updateResources();

    if (Math.random() < 0.02) {
      this.spawnPowerup();
    }
  },

  clickEnemy(event) {
    SFX.play('hit');
    let dmg = GameState.clickDps * GameState.dpsMultiplier * GameState.prestigeMultiplier;
    dmg *= GameState.comboMultiplier;
    if (GameState.activePowerups.doubleDps) dmg *= 2;

    let critChance = GameState.critChance + (GameState.activePowerups.critBoost ? 0.5 : 0);
    let isCrit = Math.random() < critChance;
    if (isCrit) dmg *= GameState.critMultiplier;

    this.dealDamage(dmg);

    const x = event.clientX;
    const y = event.clientY;
    FX.floatDamage(x, y, formatNum(Math.floor(dmg)), isCrit);
    FX.particles(x, y, isCrit ? '#f97316' : '#ef4444', 6);

    GameState.combo++;
    GameState.comboTimer = 2;
    if (GameState.combo >= 5) GameState.comboMultiplier = 1.5;
    if (GameState.combo >= 15) GameState.comboMultiplier = 2;
    if (GameState.combo >= 30) GameState.comboMultiplier = 3;
    if (GameState.combo >= 50) GameState.comboMultiplier = 5;
    UI.updateCombo();
  },

  dealDamage(dmg) {
    if (!GameState.enemy) return;
    GameState.enemyHp -= dmg;
    if (GameState.enemyHp <= 0) {
      this.killEnemy();
    }
    UI.updateEnemy();
  },

  killEnemy() {
    SFX.play('kill');
    const e = GameState.enemy;
    let goldReward = e.gold * GameState.wave * GameState.prestigeMultiplier;
    if (GameState.activePowerups.doubleGold) goldReward *= 2;
    goldReward = Math.floor(goldReward);

    GameState.gold += goldReward;
    GameState.totalGold += goldReward;
    GameState.totalLifetimeGold += goldReward;
    GameState.enemyKills++;

    if (GameState.enemyKills % 5 === 0 && Math.random() < 0.5) {
      GameState.gems++;
      FX.waveBanner('💎 +1 Gem!');
    }

    if (Math.random() < 0.3) {
      const lvl = Math.min(Math.floor(GameState.wave / 3) + 1, 5);
      this.addToGrid(lvl);
    }

    if (Math.random() < 0.1) {
      this.spawnPowerup();
    }

    const enemyArea = document.getElementById('enemy-area');
    const rect = enemyArea.getBoundingClientRect();
    FX.particles(rect.left + rect.width/2, rect.top + rect.height/2, '#fbbf24', 15);

    GameState.enemyKills % 10 === 0 ? this.nextWave() : this.spawnEnemy();
    UI.updateAll();
  },

  nextWave() {
    GameState.wave++;
    SFX.play('powerup');
    FX.waveBanner('⚔️ Wave ' + GameState.wave);

    if (GameState.wave % 5 === 0) {
      GameState.gems += Math.floor(GameState.wave / 5);
    }

    this.spawnEnemy();
  },

  spawnEnemy() {
    const idx = Math.min(Math.floor((GameState.wave - 1) / 2), ENEMIES.length - 1);
    const template = ENEMIES[idx];
    const hpMult = 1 + (GameState.wave - 1) * 0.5;
    const hp = Math.floor(template.baseHp * hpMult);

    GameState.enemy = { ...template };
    GameState.enemyMaxHp = hp;
    GameState.enemyHp = hp;
    UI.updateEnemy();
  },

  recalcDps() {
    let total = 0;
    for (const cell of GameState.grid) {
      if (cell) {
        const item = ITEMS[cell.level - 1];
        if (item) total += item.dps;
      }
    }
    const bonusMult = 1 + GameState.dpsUpgradeLevel * 0.1;
    GameState.dps = total * bonusMult;
    GameState.clickDps = Math.max(1, Math.floor(1 + total * 0.1));
  },

  addToGrid(level) {
    const emptyIdx = GameState.grid.findIndex(c => c === null);
    if (emptyIdx !== -1) {
      GameState.grid[emptyIdx] = { level };
      this.recalcDps();
      UI.renderGrid();
      return true;
    }
    return false;
  },

  selectCell(idx) {
    if (GameState.selectedCell === -1) {
      if (GameState.grid[idx]) {
        GameState.selectedCell = idx;
        UI.renderGrid();
      }
    } else if (GameState.selectedCell === idx) {
      GameState.selectedCell = -1;
      UI.renderGrid();
    } else {
      const a = GameState.grid[GameState.selectedCell];
      const b = GameState.grid[idx];

      if (a && b && a.level === b.level && a.level < ITEMS.length) {
        SFX.play('merge');
        GameState.grid[GameState.selectedCell] = null;
        GameState.grid[idx] = { level: a.level + 1 };
        GameState.selectedCell = -1;
        this.recalcDps();

        const cell = document.querySelectorAll('.grid-cell')[idx];
        if (cell) {
          const rect = cell.getBoundingClientRect();
          FX.particles(rect.left + rect.width/2, rect.top + rect.height/2, '#34d399', 12);
        }
      } else if (b === null) {
        GameState.grid[idx] = a;
        GameState.grid[GameState.selectedCell] = null;
        GameState.selectedCell = -1;
      } else {
        if (b) {
          GameState.selectedCell = idx;
        } else {
          GameState.selectedCell = -1;
        }
      }
      UI.renderGrid();
    }
  },

  autoMerge() {
    let merged = false;
    for (let level = ITEMS.length - 1; level >= 1; level--) {
      const cells = [];
      for (let i = 0; i < GameState.grid.length; i++) {
        if (GameState.grid[i] && GameState.grid[i].level === level) {
          cells.push(i);
        }
      }
      for (let i = 0; i + 1 < cells.length; i += 2) {
        GameState.grid[cells[i]] = null;
        GameState.grid[cells[i + 1]] = { level: level + 1 };
        merged = true;
      }
    }
    if (merged) {
      SFX.play('merge');
      this.recalcDps();
      UI.renderGrid();
    }
  },

  buyNewItem(currency) {
    if (currency === 'gold' && GameState.gold >= 50) {
      GameState.gold -= 50;
      const level = 1;
      if (!this.addToGrid(level)) {
        SFX.play('error');
        return;
      }
      SFX.play('buy');
      UI.updateResources();
    } else {
      SFX.play('error');
    }
  },

  spawnPowerup() {
    const type = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
    GameState.activePowerups[type.id] = { endTime: Date.now() + type.duration * 1000, type };
    SFX.play('powerup');
    UI.updatePowerups();
  },

  shopAction(action) {
    switch(action) {
      case 'buyItem1':
        if (GameState.gold >= 50) {
          GameState.gold -= 50;
          this.addToGrid(1);
          SFX.play('buy');
        } else SFX.play('error');
        break;
      case 'buyItem3':
        if (GameState.gold >= 300) {
          GameState.gold -= 300;
          this.addToGrid(3);
          SFX.play('buy');
        } else SFX.play('error');
        break;
      case 'buyItem5':
        if (GameState.gold >= 2000) {
          GameState.gold -= 2000;
          this.addToGrid(5);
          SFX.play('buy');
        } else SFX.play('error');
        break;
      case 'buyDps10':
        const dpsCost = 100 * Math.pow(1.5, GameState.dpsUpgradeLevel);
        if (GameState.gold >= dpsCost) {
          GameState.gold -= Math.floor(dpsCost);
          GameState.dpsUpgradeLevel++;
          this.recalcDps();
          SFX.play('buy');
        } else SFX.play('error');
        break;
      case 'buyGrid':
        if (GameState.gems >= 2 && GameState.gridSize < 30) {
          GameState.gems -= 2;
          GameState.gridSize++;
          GameState.gridUpgrades++;
          GameState.grid.push(null);
          SFX.play('buy');
        } else SFX.play('error');
        break;
      case 'buyCrit':
        if (GameState.gems >= 3) {
          GameState.gems -= 3;
          GameState.critUpgrades++;
          GameState.critChance = Math.min(0.5, 0.05 + GameState.critUpgrades * 0.05);
          SFX.play('buy');
        } else SFX.play('error');
        break;
      case 'buyAutoClick':
        if (GameState.gems >= 5) {
          GameState.gems -= 5;
          GameState.autoClickers++;
          SFX.play('buy');
        } else SFX.play('error');
        break;
    }
    UI.updateAll();
    UI.renderShop();
  },

  canPrestige() {
    return GameState.wave >= 5;
  },

  getPrestigeReward() {
    return Math.floor(Math.sqrt(GameState.totalLifetimeGold / 1000));
  },

  prestige() {
    if (!this.canPrestige()) return;
    const reward = this.getPrestigeReward();
    if (reward <= 0) return;

    SFX.play('prestige');
    GameState.prestigeCount++;
    GameState.prestigeMultiplier = 1 + GameState.prestigeCount * 0.25;
    GameState.gems += reward;

    GameState.gold = 0;
    GameState.totalGold = 0;
    GameState.wave = 1;
    GameState.enemyKills = 0;
    GameState.grid = new Array(GameState.gridSize).fill(null);
    GameState.dpsUpgradeLevel = 0;
    GameState.critUpgrades = 0;
    GameState.critChance = 0.05;
    GameState.activePowerups = {};
    GameState.combo = 0;
    GameState.comboMultiplier = 1;

    this.ensureGrid();
    this.recalcDps();
    this.spawnEnemy();
    UI.renderGrid();
    UI.updateAll();
  },

  die() {
    const overlay = document.getElementById('death-screen');
    overlay.classList.add('active');
    document.getElementById('death-stats').innerHTML = `
      Wave reached: <strong>${GameState.wave}</strong><br>
      Enemies killed: <strong>${GameState.enemyKills}</strong><br>
      Total gold: <strong>${formatNum(GameState.totalLifetimeGold)}</strong><br>
      Prestige level: <strong>${GameState.prestigeCount}</strong>
    `;

    Leaderboard.add('Player', GameState.wave * 1000 + GameState.enemyKills);
  },

  restart() {
    document.getElementById('death-screen').classList.remove('active');
    Save.clear();
    Object.assign(GameState, {
      gold: 0, gems: 0, totalGold: 0, wave: 1, enemyKills: 0,
      grid: [], gridSize: 20, selectedCell: -1, dps: 0, clickDps: 1,
      dpsMultiplier: 1, critChance: 0.05, critMultiplier: 2,
      combo: 0, comboTimer: 0, comboMultiplier: 1,
      enemy: null, enemyMaxHp: 0, enemyHp: 0,
      activePowerups: {}, dpsUpgradeLevel: 0, gridUpgrades: 0,
      critUpgrades: 0, autoClickers: 0,
      prestigeCount: GameState.prestigeCount,
      prestigeMultiplier: GameState.prestigeMultiplier,
      totalLifetimeGold: GameState.totalLifetimeGold,
      lastTick: Date.now(), lastAutoMerge: 0,
    });
    this.ensureGrid();
    this.recalcDps();
    this.spawnEnemy();
    UI.renderGrid();
    UI.updateAll();
  },

  save() { Save.save(); }
};

// ===== UI =====
const UI = {
  renderGrid() {
    const grid = document.getElementById('merge-grid');
    grid.innerHTML = '';
    for (let i = 0; i < GameState.gridSize; i++) {
      const cell = document.createElement('div');
      cell.className = 'grid-cell';
      const item = GameState.grid[i];

      if (i === GameState.selectedCell) cell.classList.add('selected');

      if (GameState.selectedCell >= 0 && item && GameState.grid[GameState.selectedCell] &&
          item.level === GameState.grid[GameState.selectedCell].level && i !== GameState.selectedCell) {
        cell.classList.add('merge-target');
      }

      if (item) {
        const def = ITEMS[item.level - 1];
        cell.innerHTML = `
          <div class="item">
            <div class="item-icon">${def.icon}</div>
            <div class="item-level">Lv.${item.level}</div>
          </div>
        `;
      }

      cell.onclick = () => Game.selectCell(i);
      grid.appendChild(cell);
    }
  },

  updateResources() {
    document.getElementById('gold-display').textContent = formatNum(Math.floor(GameState.gold));
    document.getElementById('gem-display').textContent = GameState.gems;
    const totalDps = GameState.dps * GameState.dpsMultiplier * GameState.prestigeMultiplier * (GameState.activePowerups.doubleDps ? 2 : 1);
    document.getElementById('dps-display').textContent = formatNum(Math.floor(totalDps));
    document.getElementById('wave-display').textContent = GameState.wave;
  },

  updateEnemy() {
    if (!GameState.enemy) return;
    document.getElementById('enemy-sprite').textContent = GameState.enemy.icon;
    document.getElementById('enemy-name').textContent = GameState.enemy.name + ' (Wave ' + GameState.wave + ')';
    const pct = Math.max(0, (GameState.enemyHp / GameState.enemyMaxHp) * 100);
    document.getElementById('enemy-hp-fill').style.width = pct + '%';
    document.getElementById('enemy-hp-text').textContent =
      formatNum(Math.max(0, Math.floor(GameState.enemyHp))) + ' / ' + formatNum(GameState.enemyMaxHp);
  },

  updateCombo() {
    const el = document.getElementById('combo-display');
    if (GameState.combo >= 5) {
      el.textContent = `🔥 x${GameState.comboMultiplier.toFixed(1)} (${GameState.combo})`;
    } else if (GameState.combo > 0) {
      el.textContent = `${GameState.combo} hits`;
    } else {
      el.textContent = '';
    }
  },

  updatePowerups() {
    const bar = document.getElementById('powerup-bar');
    bar.innerHTML = '';
    const now = Date.now();
    for (const [key, data] of Object.entries(GameState.activePowerups)) {
      const remaining = Math.max(0, Math.ceil((data.endTime - now) / 1000));
      const type = POWERUP_TYPES.find(t => t.id === key);
      if (type && remaining > 0) {
        const tag = document.createElement('div');
        tag.className = 'powerup-tag';
        tag.innerHTML = `${type.name} <span class="timer">${remaining}s</span>`;
        bar.appendChild(tag);
      }
    }
  },

  updateAll() {
    this.updateResources();
    this.updateEnemy();
    this.updateCombo();
    this.updatePowerups();
  },

  openModal(type) {
    const overlay = document.getElementById('modal-overlay');
    const content = document.getElementById('modal-content');
    overlay.classList.add('active');

    switch(type) {
      case 'shop':
        content.innerHTML = `
          <div class="modal-header">
            <h2>🏪 Shop</h2>
            <button class="close-btn" onclick="UI.closeModal()">✕</button>
          </div>
          <div id="shop-list"></div>
        `;
        this.renderShop();
        break;
      case 'more':
        content.innerHTML = `
          <div class="modal-header">
            <h2>📊 Menu</h2>
            <button class="close-btn" onclick="UI.closeModal()">✕</button>
          </div>
          <div class="tab-bar">
            <button class="tab-btn active" onclick="UI.showTab('stats', this)">Stats</button>
            <button class="tab-btn" onclick="UI.showTab('leaderboard', this)">Board</button>
            <button class="tab-btn" onclick="UI.showTab('prestige', this)">Prestige</button>
            <button class="tab-btn" onclick="UI.showTab('settings', this)">Settings</button>
          </div>
          <div id="tab-content" style="margin-top:16px;"></div>
        `;
        this.showTab('stats');
        break;
    }
  },

  closeModal(event) {
    if (event && event.target !== event.currentTarget) return;
    document.getElementById('modal-overlay').classList.remove('active');
  },

  showTab(tab, btnEl) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    if (btnEl) btnEl.classList.add('active');
    else document.querySelector('.tab-btn')?.classList.add('active');

    const container = document.getElementById('tab-content');

    switch(tab) {
      case 'stats':
        container.innerHTML = `
          <div class="stat-row"><span class="stat-label">Wave</span><span class="stat-value">${GameState.wave}</span></div>
          <div class="stat-row"><span class="stat-label">Enemies Killed</span><span class="stat-value">${GameState.enemyKills}</span></div>
          <div class="stat-row"><span class="stat-label">Total DPS</span><span class="stat-value">${formatNum(Math.floor(GameState.dps * GameState.dpsMultiplier * GameState.prestigeMultiplier))}</span></div>
          <div class="stat-row"><span class="stat-label">Click Power</span><span class="stat-value">${formatNum(GameState.clickDps)}</span></div>
          <div class="stat-row"><span class="stat-label">Crit Chance</span><span class="stat-value">${(GameState.critChance * 100).toFixed(0)}%</span></div>
          <div class="stat-row"><span class="stat-label">DPS Multiplier</span><span class="stat-value">x${(GameState.dpsMultiplier * GameState.prestigeMultiplier * (GameState.activePowerups.doubleDps ? 2 : 1)).toFixed(2)}</span></div>
          <div class="stat-row"><span class="stat-label">Prestige Level</span><span class="stat-value">${GameState.prestigeCount}</span></div>
          <div class="stat-row"><span class="stat-label">Lifetime Gold</span><span class="stat-value">${formatNum(GameState.totalLifetimeGold)}</span></div>
          <div class="stat-row"><span class="stat-label">Grid Size</span><span class="stat-value">${GameState.gridSize} slots</span></div>
          <div class="stat-row"><span class="stat-label">Auto Clickers</span><span class="stat-value">${GameState.autoClickers}</span></div>
        `;
        break;
      case 'leaderboard':
        const lb = Leaderboard.get();
        if (lb.length === 0) {
          container.innerHTML = '<p style="color:var(--text-secondary);text-align:center;padding:20px;">No scores yet!</p>';
        } else {
          container.innerHTML = lb.map((entry, i) => `
            <div class="lb-entry">
              <div class="lb-rank ${i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : ''}">${i + 1}</div>
              <div class="lb-name">${entry.name}</div>
              <div class="lb-score">${formatNum(entry.score)}</div>
            </div>
          `).join('');
        }
        break;
      case 'prestige':
        const reward = Game.getPrestigeReward();
        const canPrestige = Game.canPrestige();
        container.innerHTML = `
          <div style="text-align:center;padding:10px 0;">
            <div style="font-size:48px;margin-bottom:12px;">🌟</div>
            <p style="color:var(--text-secondary);margin-bottom:16px;">
              Prestige resets your progress but grants permanent bonuses!
            </p>
            <div class="stat-row"><span class="stat-label">Prestige Level</span><span class="stat-value">${GameState.prestigeCount}</span></div>
            <div class="stat-row"><span class="stat-label">Current Multiplier</span><span class="stat-value">x${GameState.prestigeMultiplier.toFixed(2)}</span></div>
            <div class="stat-row"><span class="stat-label">Gems on Prestige</span><span class="stat-value">💎 ${reward}</span></div>
            <div class="stat-row"><span class="stat-label">New Multiplier</span><span class="stat-value">x${(1 + (GameState.prestigeCount + 1) * 0.25).toFixed(2)}</span></div>
            <button class="prestige-btn" onclick="Game.prestige(); UI.closeModal();" ${!canPrestige ? 'disabled' : ''}>
              ${canPrestige ? '🌟 Prestige Now!' : '🔒 Reach Wave 5 to Prestige'}
            </button>
          </div>
        `;
        break;
      case 'settings':
        container.innerHTML = `
          <div class="setting-row">
            <span>🔊 Sound Effects</span>
            <button class="toggle ${SFX.enabled ? 'on' : ''}" onclick="SFX.toggle(); this.classList.toggle('on');"></button>
          </div>
          <div class="setting-row">
            <span>💾 Save Game</span>
            <button class="shop-btn" style="width:auto;height:auto;padding:6px 12px;font-size:12px;" onclick="Game.save(); this.textContent='✅ Saved!';">Save</button>
          </div>
          <div class="setting-row">
            <span>🗑️ Reset All Data</span>
            <button class="shop-btn" style="width:auto;height:auto;padding:6px 12px;font-size:12px;background:rgba(239,68,68,0.2);" onclick="if(confirm('Reset ALL data?')){Save.clear();location.reload();}">Reset</button>
          </div>
        `;
        break;
    }
  },

  renderShop() {
    const list = document.getElementById('shop-list');
    if (!list) return;

    list.innerHTML = SHOP_ITEMS.map(item => {
      let cost = item.cost;
      let canAfford = false;
      let costText = '';

      if (item.action === 'buyDps10') {
        cost = Math.floor(100 * Math.pow(1.5, GameState.dpsUpgradeLevel));
        canAfford = GameState.gold >= cost;
        costText = '🪙' + formatNum(cost);
      } else if (item.currency === 'gold') {
        canAfford = GameState.gold >= cost;
        costText = '🪙' + formatNum(cost);
      } else {
        canAfford = GameState.gems >= cost;
        costText = '💎' + cost;
      }

      if (item.action === 'buyGrid' && GameState.gridSize >= 30) {
        return `<div class="shop-item cant-afford"><div class="shop-item-icon">${item.icon}</div><div class="shop-item-info"><div class="shop-item-name">${item.name}</div><div class="shop-item-desc">Max grid size reached!</div></div></div>`;
      }

      return `
        <div class="shop-item ${canAfford ? '' : 'cant-afford'}" onclick="${canAfford ? `Game.shopAction('${item.action}')` : `SFX.play('error')`}">
          <div class="shop-item-icon">${item.icon}</div>
          <div class="shop-item-info">
            <div class="shop-item-name">${item.name}</div>
            <div class="shop-item-desc">${item.desc}</div>
          </div>
          <div class="shop-item-cost">${costText}</div>
        </div>
      `;
    }).join('');
  }
};

// ===== HELPERS =====
function formatNum(n) {
  if (n < 1000) return n.toString();
  if (n < 1e6) return (n / 1e3).toFixed(1) + 'K';
  if (n < 1e9) return (n / 1e6).toFixed(1) + 'M';
  if (n < 1e12) return (n / 1e9).toFixed(1) + 'B';
  return (n / 1e12).toFixed(1) + 'T';
}

// ===== START =====
document.addEventListener('DOMContentLoaded', () => Game.init());
</script>
</body>
